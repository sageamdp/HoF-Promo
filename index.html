<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your New Favorite Dispensary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            background: url("bg.png") center center / cover no-repeat;
            min-height: 100vh;
            position: relative;
            align-content: center;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-align: center;
        }

        .content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;

            text-shadow: 2px 2px 4px #333333;
        }

        .column {
            flex-grow: 1;
            width: 40%;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        ul {
            list-style: none;
            margin-bottom: 40px;
            padding-left: 35px;
        }

        li {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .right {
            text-align: right;
            width: 50%;
        }

        .highlight {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;

                padding-bottom: 20px;
        }

        @media (max-width: 900px) {
            h1 {
                font-size: 2.5rem;
            }

            .content {
                flex-direction: column;
            }

            .column,
            .right {
                width: 100%;
                text-align: left;
                padding-top: 0;
            }

            li,
            .highlight {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    
    <div class="overlay"></div>

    <div class="container">
        <h1>Your New Favorite Dispensary</h1>

        <div class="content">
            <div class="column">
                <h2>Free Prerolls:</h2>
                <ul>
                    <li>First Visit</li>
                    <li>Birthday</li>
                    <li>Refer a Friend</li>
                    <li>Review</li>
                </ul>

                <h2>Free Shirt or Hat:</h2>
                <ul>
                    <li>First $100 Spent</li>
                </ul>
            </div>
            <img src="leaf.png" alt="Leaf" style="width: 46%;max-width: 400px;  filter: drop-shadow(8px 2px 2px rgba(0, 0, 0, 0.25));" > 

            <div class="column right">
                <div class="highlight">5% Cash Rewards</div>
                <div class="highlight">5 Day Guarantee on Vapes</div>
                <div class="highlight">No Extra Fees Using Card</div>
            </div>
        </div>
    </div>
</body>
</html>
